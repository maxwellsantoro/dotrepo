name: public-edge-canary

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: read
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: maxwellsantoro/pagedigest
          path: sibling-pagedigest
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Check both public edges
        env:
          DOTREPO_PUBLIC_ARCHIVE_CANARY_ENABLED: ${{ vars.DOTREPO_PUBLIC_ARCHIVE_CANARY_ENABLED }}
        run: |
          archive_args=()
          if [ "$DOTREPO_PUBLIC_ARCHIVE_CANARY_ENABLED" = "true" ]; then
            archive_args+=(--sample-archived-snapshot)
          fi
          uv run python scripts/public_edge_canary.py \
            --pagedigest-repo-root sibling-pagedigest \
            --output public-edge-canary.json \
            "${archive_args[@]}"
      - name: Upload canary report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: public-edge-canary
          path: public-edge-canary.json
          if-no-files-found: ignore
      - name: Open or update failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Public edge consistency canary is failing"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "The scheduled public-edge canary failed again: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          else
            gh issue create --title "$title" --body "The dotrepo × pagedigest public-edge canary failed: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi
