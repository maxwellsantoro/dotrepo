name: index-refresh-review

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Maximum number of tracked repositories to schedule for refresh
        required: false
        default: "10"
      batch_size:
        description: Maximum repositories per reviewer-facing refresh batch
        required: false
        default: "5"
      open_pr:
        description: Open a draft PR for the first refresh batch after review artifacts are generated
        required: false
        default: "false"
      state_path:
        description: Crawler state file to inspect
        required: false
        default: index/.crawler-state.toml
  schedule:
    - cron: "0 13 * * 4"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: index-refresh-review
  cancel-in-progress: false

jobs:
  refresh-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Resolve workflow inputs
        id: inputs
        shell: bash
        run: |
          limit="${{ github.event.inputs.limit }}"
          batch_size="${{ github.event.inputs.batch_size }}"
          open_pr="${{ github.event.inputs.open_pr }}"
          state_path="${{ github.event.inputs.state_path }}"
          if [ -z "$limit" ]; then
            limit="10"
          fi
          if [ -z "$batch_size" ]; then
            batch_size="5"
          fi
          if [ -z "$open_pr" ]; then
            open_pr="false"
          fi
          if [ -z "$state_path" ]; then
            state_path="index/.crawler-state.toml"
          fi
          echo "limit=$limit" >> "$GITHUB_OUTPUT"
          echo "batch_size=$batch_size" >> "$GITHUB_OUTPUT"
          echo "open_pr=$open_pr" >> "$GITHUB_OUTPUT"
          echo "state_path=$state_path" >> "$GITHUB_OUTPUT"
      - name: Resolve auto-PR mode
        id: pr_mode
        shell: bash
        run: |
          enabled="false"
          if [ "${{ steps.inputs.outputs.open_pr }}" = "true" ] || [ "${{ vars.DOTREPO_INDEX_REFRESH_AUTO_PR_ENABLED }}" = "true" ]; then
            enabled="true"
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
      - name: Generate refresh review artifacts
        id: generate
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p index-refresh-review
          status=0
          cargo run -p dotrepo-crawler -- refresh-plan \
            --state-path "${{ steps.inputs.outputs.state_path }}" \
            --limit "${{ steps.inputs.outputs.limit }}" \
            --json > index-refresh-review/refresh-plan.json || status=$?
          if [ -f index-refresh-review/refresh-plan.json ]; then
            python3 scripts/plan_refresh_review_batches.py \
              --input index-refresh-review/refresh-plan.json \
              --batch-size "${{ steps.inputs.outputs.batch_size }}" \
              --output-json index-refresh-review/refresh-batches.json \
              --output-md index-refresh-review/refresh-batches.md
            python3 scripts/render_refresh_plan_summary.py \
              --input index-refresh-review/refresh-plan.json \
              --batches index-refresh-review/refresh-batches.json > index-refresh-review/refresh-plan.md
          fi
          cat <<EOF > index-refresh-review/run-context.txt
          workflow=index-refresh-review
          limit=${{ steps.inputs.outputs.limit }}
          batch_size=${{ steps.inputs.outputs.batch_size }}
          state_path=${{ steps.inputs.outputs.state_path }}
          ref=${{ github.ref }}
          sha=${{ github.sha }}
          run_id=${{ github.run_id }}
          event_name=${{ github.event_name }}
          EOF
          exit "$status"
      - name: Publish GitHub summary
        if: always()
        shell: bash
        run: |
          if [ -f index-refresh-review/refresh-plan.json ]; then
            python3 scripts/render_refresh_plan_summary.py \
              --input index-refresh-review/refresh-plan.json \
              --batches index-refresh-review/refresh-batches.json >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Index Refresh Review"
              echo
              echo "- refresh-plan generation failed before producing JSON"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload refresh review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: index-refresh-review
          path: index-refresh-review/
          if-no-files-found: error
          retention-days: 14
      - name: Select first refresh batch for auto-PR
        id: auto_batch
        if: steps.generate.outcome == 'success' && steps.pr_mode.outputs.enabled == 'true'
        shell: bash
        run: |
          selected="false"
          if python3 scripts/select_review_batch.py \
            --input index-refresh-review/refresh-batches.json \
            --first-batch \
            --output-targets index-refresh-review/selected-targets.txt \
            --output-metadata index-refresh-review/selected-batch.json; then
            selected="true"
            batch_id="$(python3 -c 'import json, sys; data = json.load(open(sys.argv[1])); print(data["batch"]["id"])' index-refresh-review/selected-batch.json)"
            title="$(python3 -c 'import json, sys; data = json.load(open(sys.argv[1])); print(f"chore(index): {data[\"batch\"][\"suggestedPrTitle\"]}")' index-refresh-review/selected-batch.json)"
            branch="automation/index-refresh-review/$batch_id-${{ github.run_id }}"
            echo "batch_id=$batch_id" >> "$GITHUB_OUTPUT"
            echo "title=$title" >> "$GITHUB_OUTPUT"
            echo "branch=$branch" >> "$GITHUB_OUTPUT"
          fi
          echo "selected=$selected" >> "$GITHUB_OUTPUT"
      - name: Append refresh auto-PR summary
        if: steps.pr_mode.outputs.enabled == 'true'
        shell: bash
        run: |
          {
            echo
            echo "## Auto PR"
            echo
            if [ "${{ steps.auto_batch.outputs.selected }}" = "true" ]; then
              echo "- selected batch: \`${{ steps.auto_batch.outputs.batch_id }}\`"
              echo "- branch: \`${{ steps.auto_batch.outputs.branch }}\`"
              echo "- draft PR title: \`${{ steps.auto_batch.outputs.title }}\`"
            else
              echo "- no refresh batch was selected for automatic PR creation"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Render refresh auto-PR body
        if: steps.auto_batch.outputs.selected == 'true'
        shell: bash
        run: |
          python3 scripts/render_review_batch_pull_request.py \
            --input index-refresh-review/selected-batch.json \
            --kind refresh \
            --output index-refresh-review/pr-body.md
      - name: Apply selected refresh batch for auto-PR
        if: steps.auto_batch.outputs.selected == 'true'
        shell: bash
        run: |
          : > index-refresh-review/applied-crawls.ndjson
          while IFS=/ read -r host owner repo; do
            if [ -z "$host" ]; then
              continue
            fi
            cargo run -p dotrepo-crawler -- crawl \
              --index-root index \
              --state-path "${{ steps.inputs.outputs.state_path }}" \
              --host "$host" \
              --owner "$owner" \
              --repo "$repo" \
              --write \
              --json >> index-refresh-review/applied-crawls.ndjson
          done < index-refresh-review/selected-targets.txt
      - name: Validate index after refresh auto-PR writeback
        if: steps.auto_batch.outputs.selected == 'true'
        run: cargo run -p dotrepo-cli -- validate-index
      - name: Create draft refresh auto-PR
        if: steps.auto_batch.outputs.selected == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ steps.auto_batch.outputs.branch }}
          title: ${{ steps.auto_batch.outputs.title }}
          commit-message: ${{ steps.auto_batch.outputs.title }}
          body-path: index-refresh-review/pr-body.md
          draft: true
          delete-branch: true
          add-paths: |
            index/**
      - name: Upload refresh auto-PR execution artifacts
        if: always() && steps.auto_batch.outputs.selected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: index-refresh-review-auto-pr
          path: index-refresh-review/
          if-no-files-found: error
          retention-days: 14
      - name: Fail workflow if refresh plan generation failed
        if: steps.generate.outcome == 'failure'
        run: |
          echo "refresh review completed with failures; inspect uploaded artifacts" >&2
          exit 1
