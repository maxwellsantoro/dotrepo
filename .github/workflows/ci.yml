name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust-and-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check formatting and compile
        run: |
          cargo fmt --all -- --check
          cargo check --workspace
