name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust-and-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check formatting, tests, and seeded flows
        run: |
          cargo fmt --all -- --check
          cargo test --workspace
          cargo run -p dotrepo-cli -- --root examples/native-minimal validate
          cargo run -p dotrepo-cli -- --root examples/native-minimal generate --check
          cargo run -p dotrepo-cli -- validate-index
      - name: Build static public export artifact
        run: |
          cargo run -p dotrepo-cli -- public export \
            --index-root index \
            --out-dir public \
            --generated-at 2026-03-10T18:30:00Z \
            --stale-after 2026-03-11T18:30:00Z
      - name: Package versioned public export bundle
        run: |
          python3 scripts/package_public_export.py --input public --output-dir dist
      - name: Upload static public export artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-export-v0
          path: public/
          if-no-files-found: error
          retention-days: 14
      - name: Upload public export bundle
        uses: actions/upload-artifact@v4
        with:
          name: public-export-v0-bundle
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14
      - name: Smoke test MCP stdio server
        run: |
          python3 - <<'PY'
          import json
          import subprocess

          proc = subprocess.Popen(
              ["cargo", "run", "-p", "dotrepo-mcp"],
              stdin=subprocess.PIPE,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              text=False,
          )

          def send(message, expect_response=True):
              payload = json.dumps(message).encode()
              proc.stdin.write(f"Content-Length: {len(payload)}\r\n\r\n".encode())
              proc.stdin.write(payload)
              proc.stdin.flush()
              if not expect_response:
                  return None
              header = b""
              while b"\r\n\r\n" not in header:
                  chunk = proc.stdout.read(1)
                  if not chunk:
                      raise RuntimeError("unexpected EOF while reading MCP headers")
                  header += chunk
              length = None
              for line in header.decode().split("\r\n"):
                  if line.lower().startswith("content-length:"):
                      length = int(line.split(":", 1)[1].strip())
                      break
              if length is None:
                  raise RuntimeError("missing Content-Length header")
              body = proc.stdout.read(length)
              return json.loads(body)

          init = send({
              "jsonrpc": "2.0",
              "id": 1,
              "method": "initialize",
              "params": {
                  "protocolVersion": "2025-11-25",
                  "capabilities": {},
                  "clientInfo": {"name": "ci-smoke", "version": "0"}
              }
          })
          assert init["result"]["protocolVersion"] == "2025-11-25"

          send({
              "jsonrpc": "2.0",
              "method": "notifications/initialized",
              "params": {}
          }, expect_response=False)

          tools = send({
              "jsonrpc": "2.0",
              "id": 2,
              "method": "tools/list",
              "params": {}
          })
          assert any(tool["name"] == "dotrepo.validate" for tool in tools["result"]["tools"])

          validate = send({
              "jsonrpc": "2.0",
              "id": 3,
              "method": "tools/call",
              "params": {
                  "name": "dotrepo.validate",
                  "arguments": {"root": "examples/native-minimal"}
              }
          })
          structured = validate["result"]["structuredContent"]
          assert structured["valid"] is True
          assert structured["diagnostics"] == []

          query = send({
              "jsonrpc": "2.0",
              "id": 4,
              "method": "tools/call",
              "params": {
                  "name": "dotrepo.query",
                  "arguments": {
                      "root": "examples/native-minimal",
                      "path": "repo.name"
                  }
              }
          })
          assert query["result"]["structuredContent"]["value"] == "orbit"

          proc.terminate()
          proc.wait(timeout=5)
          PY
