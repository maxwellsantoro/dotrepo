name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  # Faster, smaller dev/test builds in CI; local `cargo` is unaffected.
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

jobs:
  change-scope:
    runs-on: ubuntu-latest
    outputs:
      run_rust_ci: ${{ steps.scope.outputs.run_rust_ci }}
      run_operator_gate: ${{ steps.scope.outputs.run_operator_gate }}
      run_public_surface_gate: ${{ steps.scope.outputs.run_public_surface_gate }}
      run_release_gate: ${{ steps.scope.outputs.run_release_gate }}
      run_minimal_gate: ${{ steps.scope.outputs.run_minimal_gate }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            mapfile -t changed_files < <(git ls-files)
          else
            mapfile -t changed_files < <(git diff --name-only "$base" "$head")
          fi

          has_any=false
          has_rust_toolchain=false
          has_public_surface=false
          has_claim_sensitive=false

          for path in "${changed_files[@]}"; do
            [ -n "$path" ] || continue
            has_any=true

            if [[ "$path" =~ ^(Cargo\.toml|Cargo\.lock|pyproject\.toml|uv\.lock|\.python-version|crates/|examples/|scripts/|cloudflare/|editors/|\.github/workflows/|\.cargo/|docs/|rfcs/) ]]; then
              has_rust_toolchain=true
            fi

            if [[ "$path" =~ ^(index/|crates/dotrepo-core/|crates/dotrepo-cli/|scripts/check_release_gate\.py|scripts/render_public_pages_landing\.py|scripts/package_public_export\.py|scripts/sync_cloudflare_public_snapshot\.py|cloudflare/hosted-query/) ]]; then
              has_public_surface=true
            fi

            if [[ "$path" =~ ^index/repos/[^/]+/[^/]+/[^/]+/claims/ ]] || [[ "$path" =~ ^(scripts/check_operator_claim_gate\.py|crates/dotrepo-core/|crates/dotrepo-cli/) ]]; then
              has_claim_sensitive=true
            fi
          done

          run_rust_ci=false
          run_operator_gate=false
          run_public_surface_gate=false
          run_release_gate=false
          run_minimal_gate=false

          if [ "$has_any" = false ]; then
            run_rust_ci=true
            run_operator_gate=true
            run_public_surface_gate=true
            run_release_gate=true
          else
            if [ "$has_rust_toolchain" = true ]; then
              run_rust_ci=true
              run_release_gate=true
            elif [ "$has_public_surface" = true ]; then
              run_public_surface_gate=true
            fi
            if [ "$has_claim_sensitive" = true ]; then
              run_operator_gate=true
            fi
            if [ "$has_any" = true ] && [ "$has_rust_toolchain" = false ] && [ "$has_public_surface" = false ] && [ "$has_claim_sensitive" = false ]; then
              run_minimal_gate=true
            fi
          fi

          {
            echo "run_rust_ci=$run_rust_ci"
            echo "run_operator_gate=$run_operator_gate"
            echo "run_public_surface_gate=$run_public_surface_gate"
            echo "run_release_gate=$run_release_gate"
            echo "run_minimal_gate=$run_minimal_gate"
          } >> "$GITHUB_OUTPUT"

          {
            echo "Changed files:"
            if [ "${#changed_files[@]}" -eq 0 ]; then
              echo "- <none detected>"
            else
              for path in "${changed_files[@]}"; do
                [ -n "$path" ] || continue
                echo "- $path"
              done
            fi
            echo
            echo "Planned jobs:"
            echo "- rust-and-index: $run_rust_ci"
            echo "- operator-gate: $run_operator_gate"
            echo "- public-surface-gate: $run_public_surface_gate"
            echo "- release-gate: $run_release_gate"
            echo "- minimal-gate: $run_minimal_gate"
          } >> "$GITHUB_STEP_SUMMARY"

  rust-and-index:
    needs: change-scope
    if: needs.change-scope.outputs.run_rust_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Create and sync Python environment
        run: |
          uv venv
          uv sync --dev --locked
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Enable faster linker when mold is available
        run: |
          if sudo apt-get install -y mold; then
            echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold" >> "$GITHUB_ENV"
            echo "mold linker enabled"
          else
            echo "mold unavailable; using default linker"
          fi
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.9 --locked
      - name: Check formatting, linting, tests, and seeded flows
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo deny check advisories licenses bans sources
          uv run ruff check
          uv run ruff format --check
          uv run python scripts/check_toolchain_manifest_parity.py
          cargo test --workspace
          uv run pytest
          cargo run -p dotrepo-cli -- --root examples/native-minimal validate
          cargo run -p dotrepo-cli -- --root examples/native-minimal generate --check
          # The repository ships its own native .repo; keep it valid so the
          # project dogfoods its own protocol (catches dangling doc references,
          # stale managed-surface paths, and schema drift in the root manifest).
          cargo run -p dotrepo-cli -- --root . validate
          cargo run -p dotrepo-cli -- validate-index
      - name: Verify publishable crates package and dry-run cleanly
        run: |
          cargo publish --dry-run -p dotrepo-schema
          cargo publish --dry-run -p dotrepo-transport
          cargo publish --dry-run -p dotrepo-core
          cargo publish --dry-run -p dotrepo-cli
          cargo publish --dry-run -p dotrepo-lsp
          cargo publish --dry-run -p dotrepo-mcp
      - name: Smoke test MCP stdio server
        run: |
          uv run python - <<'PY'
          import json
          import subprocess

          proc = subprocess.Popen(
              ["cargo", "run", "-p", "dotrepo-mcp"],
              stdin=subprocess.PIPE,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              text=False,
          )

          # The MCP stdio transport is newline-delimited JSON (one message per
          # line), matching real MCP clients; Content-Length framing is LSP.
          def send(message, expect_response=True):
              proc.stdin.write(json.dumps(message).encode() + b"\n")
              proc.stdin.flush()
              if not expect_response:
                  return None
              line = proc.stdout.readline()
              if not line:
                  raise RuntimeError("unexpected EOF while reading MCP response")
              return json.loads(line)

          init = send({
              "jsonrpc": "2.0",
              "id": 1,
              "method": "initialize",
              "params": {
                  "protocolVersion": "2025-11-25",
                  "capabilities": {},
                  "clientInfo": {"name": "ci-smoke", "version": "0"}
              }
          })
          assert init["result"]["protocolVersion"] == "2025-11-25"

          send({
              "jsonrpc": "2.0",
              "method": "notifications/initialized",
              "params": {}
          }, expect_response=False)

          tools = send({
              "jsonrpc": "2.0",
              "id": 2,
              "method": "tools/list",
              "params": {}
          })
          assert any(tool["name"] == "dotrepo.validate" for tool in tools["result"]["tools"])

          validate = send({
              "jsonrpc": "2.0",
              "id": 3,
              "method": "tools/call",
              "params": {
                  "name": "dotrepo.validate",
                  "arguments": {"root": "examples/native-minimal"}
              }
          })
          structured = validate["result"]["structuredContent"]
          assert structured["valid"] is True
          assert structured["diagnostics"] == []

          query = send({
              "jsonrpc": "2.0",
              "id": 4,
              "method": "tools/call",
              "params": {
                  "name": "dotrepo.query",
                  "arguments": {
                      "root": "examples/native-minimal",
                      "path": "repo.name"
                  }
              }
          })
          assert query["result"]["structuredContent"]["value"] == "orbit"

          trust = send({
              "jsonrpc": "2.0",
              "id": 5,
              "method": "tools/call",
              "params": {
                  "name": "dotrepo.trust",
                  "arguments": {"root": "examples/native-minimal"}
              }
          })
          assert trust["result"]["structuredContent"]["selection"]["reason"] == "only_matching_record"

          preview = send({
              "jsonrpc": "2.0",
              "id": 6,
              "method": "tools/call",
              "params": {
                  "name": "dotrepo.import_preview",
                  "arguments": {
                      "root": "examples/native-minimal",
                      "mode": "native"
                  }
              }
          })
          assert preview["result"]["structuredContent"]["record"]["status"] == "draft"

          import_write = send({
              "jsonrpc": "2.0",
              "id": 7,
              "method": "tools/call",
              "params": {
                  "name": "dotrepo.import_write",
                  "arguments": {
                      "root": "examples/native-minimal",
                      "mode": "native"
                  }
              }
          })
          assert import_write["result"]["isError"] is True
          assert "already exists" in import_write["result"]["structuredContent"]["error"]

          proc.terminate()
          proc.wait(timeout=5)
          PY
      - name: Smoke test LSP stdio server
        run: |
          uv run python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          manifest = Path("examples/native-minimal/.repo").resolve()
          uri = manifest.as_uri()
          text = manifest.read_text()

          proc = subprocess.Popen(
              ["cargo", "run", "-p", "dotrepo-lsp"],
              stdin=subprocess.PIPE,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              text=False,
          )

          def read_message():
              header = b""
              while b"\r\n\r\n" not in header:
                  chunk = proc.stdout.read(1)
                  if not chunk:
                      raise RuntimeError("unexpected EOF while reading LSP headers")
                  header += chunk
              length = None
              for line in header.decode().split("\r\n"):
                  if line.lower().startswith("content-length:"):
                      length = int(line.split(":", 1)[1].strip())
                      break
              if length is None:
                  raise RuntimeError("missing Content-Length header")
              body = proc.stdout.read(length)
              return json.loads(body)

          def send(message, expect_response=True):
              payload = json.dumps(message).encode()
              proc.stdin.write(f"Content-Length: {len(payload)}\r\n\r\n".encode())
              proc.stdin.write(payload)
              proc.stdin.flush()
              if not expect_response:
                  return None
              return read_message()

          init = send({
              "jsonrpc": "2.0",
              "id": 1,
              "method": "initialize",
              "params": {
                  "processId": None,
                  "capabilities": {},
                  "clientInfo": {"name": "ci-smoke", "version": "0"}
              }
          })
          assert init["result"]["serverInfo"]["name"] == "dotrepo-lsp"

          send({
              "jsonrpc": "2.0",
              "method": "initialized",
              "params": {}
          }, expect_response=False)

          send({
              "jsonrpc": "2.0",
              "method": "textDocument/didOpen",
              "params": {
                  "textDocument": {
                      "uri": uri,
                      "languageId": "toml",
                      "version": 1,
                      "text": text
                  }
              }
          }, expect_response=False)

          diagnostics = read_message()
          assert diagnostics["method"] == "textDocument/publishDiagnostics"
          assert diagnostics["params"]["uri"] == uri
          assert all(
              diagnostic.get("severity", 1) > 3
              for diagnostic in diagnostics["params"]["diagnostics"]
          ), diagnostics["params"]["diagnostics"]

          send({
              "jsonrpc": "2.0",
              "id": 2,
              "method": "shutdown",
              "params": {}
          })
          send({
              "jsonrpc": "2.0",
              "method": "exit",
              "params": {}
          }, expect_response=False)

          proc.wait(timeout=5)
          PY

  operator-gate:
    needs: [change-scope, rust-and-index]
    if: >-
      always() &&
      needs.change-scope.outputs.run_operator_gate == 'true' &&
      (needs.rust-and-index.result == 'success' || needs.rust-and-index.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Create and sync Python environment
        run: |
          uv venv
          uv sync --dev --locked
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Enable faster linker when mold is available
        run: |
          if sudo apt-get install -y mold; then
            echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold" >> "$GITHUB_ENV"
            echo "mold linker enabled"
          else
            echo "mold unavailable; using default linker"
          fi
      - name: Run explicit maintainer/operator claim gate
        run: uv run python scripts/check_operator_claim_gate.py --output-root operator-gate
      - name: Upload operator gate inspection artifacts
        uses: actions/upload-artifact@v7
        with:
          name: operator-gate-claim-reports
          path: operator-gate/
          if-no-files-found: error
          retention-days: 14
      - name: Upload staged live-handoff public export
        uses: actions/upload-artifact@v7
        with:
          name: operator-gate-live-seed-handoff-public
          path: operator-gate/live-seed-handoff-public/
          if-no-files-found: error
          retention-days: 14

  public-surface-gate:
    needs: [change-scope, rust-and-index]
    if: >-
      always() &&
      needs.change-scope.outputs.run_public_surface_gate == 'true' &&
      (needs.rust-and-index.result == 'success' || needs.rust-and-index.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Create and sync Python environment
        run: |
          uv venv
          uv sync --dev --locked
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Enable faster linker when mold is available
        run: |
          if sudo apt-get install -y mold; then
            echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold" >> "$GITHUB_ENV"
            echo "mold linker enabled"
          else
            echo "mold unavailable; using default linker"
          fi
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare/hosted-query/package-lock.json
      - name: Run import quality gate
        run: cargo test -p dotrepo-core --test import_quality_gate
      - name: Run Rust format and lint checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
      - name: Run core Rust smoke tests
        run: |
          cargo test -p dotrepo-core
          cargo test -p dotrepo-cli -p dotrepo-mcp -p dotrepo-lsp -p dotrepo-crawler
          cargo run -p dotrepo-cli -- validate-index
      - name: Run lightweight public-surface gate
        run: uv run python scripts/check_release_gate.py --output-root release-gate --skip-release-bundle --skip-vsix
      - name: Upload static public export artifact
        uses: actions/upload-artifact@v7
        with:
          name: public-export-v0-lightweight
          path: release-gate/public/
          if-no-files-found: error
          retention-days: 7
      - name: Upload public export bundle
        uses: actions/upload-artifact@v7
        with:
          name: public-export-v0-bundle-lightweight
          path: release-gate/public-bundle/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  minimal-gate:
    needs: change-scope
    if: needs.change-scope.outputs.run_minimal_gate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Create and sync Python environment
        run: |
          uv venv
          uv sync --dev --locked
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Enable faster linker when mold is available
        run: |
          if sudo apt-get install -y mold; then
            echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold" >> "$GITHUB_ENV"
            echo "mold linker enabled"
          else
            echo "mold unavailable; using default linker"
          fi
      - name: Run minimal validation gate
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          uv run ruff check
          uv run ruff format --check
          uv run python scripts/check_toolchain_manifest_parity.py
          cargo test --workspace
          uv run pytest
          cargo run -p dotrepo-cli -- validate-index

  release-gate:
    needs:
      - change-scope
      - rust-and-index
    if: >-
      always() &&
      needs.change-scope.outputs.run_release_gate == 'true' &&
      (needs.rust-and-index.result == 'success' || needs.rust-and-index.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Create and sync Python environment
        run: |
          uv venv
          uv sync --dev --locked
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Enable faster linker when mold is available
        run: |
          if sudo apt-get install -y mold; then
            echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold" >> "$GITHUB_ENV"
            echo "mold linker enabled"
          else
            echo "mold unavailable; using default linker"
          fi
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            cloudflare/hosted-query/package-lock.json
            editors/vscode/package-lock.json
      - name: Run explicit release-surface gate
        run: uv run python scripts/check_release_gate.py --output-root release-gate
      - name: Upload static public export artifact
        uses: actions/upload-artifact@v7
        with:
          name: public-export-v0
          path: release-gate/public/
          if-no-files-found: error
          retention-days: 14
      - name: Upload public export bundle
        uses: actions/upload-artifact@v7
        with:
          name: public-export-v0-bundle
          path: release-gate/public-bundle/*.tar.gz
          if-no-files-found: error
          retention-days: 14
      - name: Upload release-style install bundles
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-install-bundles
          path: |
            release-gate/release-bundle/*.tar.gz
            release-gate/release-bundle/*.sha256
          if-no-files-found: error
          retention-days: 14
      - name: Upload release-style VSIX
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-vscode-vsix
          path: release-gate/vsix/*.vsix
          if-no-files-found: error
          retention-days: 14
