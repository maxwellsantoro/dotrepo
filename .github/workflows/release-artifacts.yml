name: release-artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  version-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Verify release version integrity
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            uv run python scripts/check_release_version.py --tag "${GITHUB_REF_NAME}"
          else
            uv run python scripts/check_release_version.py
          fi

  binaries:
    needs: version-integrity
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact_name: dotrepo-binaries-linux
          - runner: macos-latest
            artifact_name: dotrepo-binaries-macos
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Create and sync Python environment
        run: |
          uv venv
          uv sync --dev --locked
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Cache cargo artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build release binaries
        run: cargo build --release -p dotrepo-cli --bins -p dotrepo-lsp -p dotrepo-mcp
      - name: Detect host target triple
        id: target
        shell: bash
        run: |
          echo "value=$(rustc -vV | sed -n 's/^host: //p')" >> "$GITHUB_OUTPUT"
      - name: Package release bundle
        run: |
          uv run python scripts/package_release_binaries.py \
            --bin-dir target/release \
            --output-dir dist \
            --target "${{ steps.target.outputs.value }}"
      - name: Upload binary bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.target.outputs.value }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

  vscode-extension:
    needs: version-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Create and sync Python environment
        run: |
          uv venv
          uv sync --dev --locked
      - name: Set up Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install VS Code extension dependencies
        working-directory: editors/vscode
        run: npm ci
      - name: Build bundled VS Code extension
        working-directory: editors/vscode
        run: npm run build
      - name: Detect VS Code extension version
        id: version
        run: |
          version=$(node -p "require('./editors/vscode/package.json').version")
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - name: Package VSIX
        working-directory: editors/vscode
        run: |
          mkdir -p ../../dist
          npm run package:vsix -- --output ../../dist/dotrepo-vscode-v${{ steps.version.outputs.value }}.vsix
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dotrepo-vscode-vsix
          path: dist/*.vsix
          if-no-files-found: error
          retention-days: 14

  release:
    if: github.ref_type == 'tag'
    needs:
      - binaries
      - vscode-extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Create and sync Python environment
        run: |
          uv venv
          uv sync --dev --locked
      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release-assets
      - name: Detect release version
        id: version
        shell: bash
        run: |
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Package MCPB bundle for the MCP registry
        shell: bash
        run: |
          args=()
          while IFS= read -r tarball; do
            args+=(--tarball "$tarball")
          done < <(find release-assets -name '*.tar.gz' | sort)
          uv run python scripts/package_mcpb_bundle.py \
            "${args[@]}" \
            --version "${{ steps.version.outputs.value }}" \
            --output-dir release-assets/mcpb \
            --update-server-json server.json
      - name: Upload MCPB artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dotrepo-mcpb
          path: |
            release-assets/mcpb/*.mcpb
            release-assets/mcpb/*.sha256
            server.json
          if-no-files-found: error
          retention-days: 14
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.sha256
            release-assets/**/*.vsix
            release-assets/mcpb/*.mcpb

  publish-crates:
    if: github.ref_type == 'tag'
    needs:
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Publish crates to crates.io
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          publish_one() {
            local crate="$1"
            shift
            if curl -fsS -A "dotrepo-release-workflow (github.com/maxwellsantoro/dotrepo)" \
              "https://crates.io/api/v1/crates/${crate}/${version}" > /dev/null 2>&1; then
              echo "${crate} ${version} already on crates.io; skipping"
              return 0
            fi
            cargo publish "$@"
          }
          for crate in dotrepo-schema dotrepo-transport dotrepo-core dotrepo-cli dotrepo-mcp dotrepo-lsp; do
            publish_one "$crate" -p "$crate"
          done
          # The standalone alias package is excluded from the workspace and
          # must be published last: its verification build resolves the
          # dotrepo-cli version published above from the registry.
          publish_one dotrepo --manifest-path crates/dotrepo/Cargo.toml

  mcp-registry:
    if: github.ref_type == 'tag'
    needs:
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download MCPB artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dotrepo-mcpb
          path: mcpb-assets
      - name: Install mcp-publisher
        env:
          MCP_PUBLISHER_VERSION: "1.7.9"
          MCP_PUBLISHER_SHA256: "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac"
        run: |
          archive="mcp-publisher_linux_amd64.tar.gz"
          curl -fsSL -o "$archive" \
            "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/${archive}"
          echo "${MCP_PUBLISHER_SHA256}  ${archive}" | sha256sum -c -
          tar xz -f "$archive" mcp-publisher
          rm -f "$archive"
      - name: Publish to the MCP registry
        run: |
          cp mcpb-assets/server.json server.json
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
