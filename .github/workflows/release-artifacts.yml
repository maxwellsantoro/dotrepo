name: release-artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact_name: dotrepo-binaries-linux
          - runner: macos-latest
            artifact_name: dotrepo-binaries-macos
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build release binaries
        run: cargo build --release -p dotrepo-cli --bins -p dotrepo-lsp -p dotrepo-mcp
      - name: Detect host target triple
        id: target
        shell: bash
        run: |
          echo "value=$(rustc -vV | sed -n 's/^host: //p')" >> "$GITHUB_OUTPUT"
      - name: Package release bundle
        run: |
          python3 scripts/package_release_binaries.py \
            --bin-dir target/release \
            --output-dir dist \
            --target "${{ steps.target.outputs.value }}"
      - name: Upload binary bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.target.outputs.value }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install VS Code extension dependencies
        working-directory: editors/vscode
        run: npm ci
      - name: Detect VS Code extension version
        id: version
        run: |
          version=$(node -p "require('./editors/vscode/package.json').version")
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - name: Package VSIX
        working-directory: editors/vscode
        env:
          npm_config_cache: ${{ runner.temp }}/npm-cache
        run: |
          mkdir -p ../../dist
          npx --yes @vscode/vsce package --out ../../dist/dotrepo-vscode-v${{ steps.version.outputs.value }}.vsix
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotrepo-vscode-vsix
          path: dist/*.vsix
          if-no-files-found: error
          retention-days: 14

  release:
    if: github.ref_type == 'tag'
    needs:
      - binaries
      - vscode-extension
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.sha256
            release-assets/**/*.vsix
