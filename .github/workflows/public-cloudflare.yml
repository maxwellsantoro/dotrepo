name: public-cloudflare

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && vars.CLOUDFLARE_PUBLIC_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Resolve hosted base path
        id: base_path
        shell: bash
        run: |
          value="${{ vars.DOTREPO_PUBLIC_BASE_PATH }}"
          if [ -z "$value" ]; then
            value="/dotrepo"
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
      - name: Validate index before export
        run: cargo run -p dotrepo-cli -- validate-index
      - name: Build reviewed public tree for Cloudflare
        run: |
          cargo run -p dotrepo-cli -- public export \
            --index-root index \
            --out-dir release-gate/public \
            --base-path "${{ steps.base_path.outputs.value }}" \
            --stale-after-hours 24
      - name: Render landing page
        run: python3 scripts/render_public_pages_landing.py --input release-gate/public
      - name: Stage Worker snapshot
        run: |
          python3 scripts/sync_cloudflare_public_snapshot.py \
            --input release-gate/public \
            --output cloudflare/hosted-query/public-snapshot
      - name: Install Worker dependencies
        working-directory: cloudflare/hosted-query
        env:
          npm_config_cache: ${{ runner.temp }}/npm-cache
        run: npm ci
      - name: Run Worker tests
        working-directory: cloudflare/hosted-query
        env:
          npm_config_cache: ${{ runner.temp }}/npm-cache
        run: npm test
      - name: Deploy Worker
        working-directory: cloudflare/hosted-query
        env:
          npm_config_cache: ${{ runner.temp }}/npm-cache
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
