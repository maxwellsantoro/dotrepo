name: public-cloudflare

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && vars.CLOUDFLARE_PUBLIC_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cloudflare/hosted-query/package-lock.json
      - name: Resolve hosted base path
        id: base_path
        shell: bash
        run: |
          value="${{ vars.DOTREPO_PUBLIC_BASE_PATH }}"
          if [ -z "$value" ]; then
            value="/"
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
      - name: Validate custom-domain base path
        shell: bash
        run: |
          custom_domain_count="$(python3 -c 'import json; from pathlib import Path; config = json.loads(Path("cloudflare/hosted-query/wrangler.jsonc").read_text(encoding="utf-8")); print(sum(1 for route in config.get("routes", []) if route.get("custom_domain") is True))')"
          if [ "$custom_domain_count" -gt 0 ] && [ "${{ steps.base_path.outputs.value }}" != "/" ]; then
            echo "Cloudflare custom-domain deploys must use DOTREPO_PUBLIC_BASE_PATH=/" >&2
            exit 1
          fi
      - name: Validate index before export
        run: cargo run -p dotrepo-cli -- validate-index
      - name: Build reviewed public tree for Cloudflare
        run: |
          cargo run -p dotrepo-cli -- public export \
            --index-root index \
            --out-dir release-gate/public \
            --base-path "${{ steps.base_path.outputs.value }}" \
            --stale-after-hours 24
      - name: Render landing page
        run: python3 scripts/render_public_pages_landing.py --input release-gate/public
      - name: Stage Worker snapshot
        run: |
          python3 scripts/sync_cloudflare_public_snapshot.py \
            --input release-gate/public \
            --output cloudflare/hosted-query/public-snapshot
      - name: Install Worker dependencies
        working-directory: cloudflare/hosted-query
        env:
          npm_config_cache: ${{ runner.temp }}/npm-cache
        run: npm ci
      - name: Run Worker tests
        working-directory: cloudflare/hosted-query
        env:
          npm_config_cache: ${{ runner.temp }}/npm-cache
        run: npm test
      - name: Resolve smoke origin
        id: smoke_origin
        shell: bash
        run: |
          value="$(python3 -c 'import json; from pathlib import Path; config = json.loads(Path("cloudflare/hosted-query/wrangler.jsonc").read_text(encoding="utf-8")); routes = [route.get("pattern") for route in config.get("routes", []) if route.get("custom_domain") is True and isinstance(route.get("pattern"), str)]; print(f"https://{routes[0]}" if routes else "")')"
          echo "value=$value" >> "$GITHUB_OUTPUT"
      - name: Deploy Worker
        id: deploy
        working-directory: cloudflare/hosted-query
        shell: bash
        env:
          npm_config_cache: ${{ runner.temp }}/npm-cache
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          log_path="$RUNNER_TEMP/wrangler-deploy.log"
          npx wrangler deploy 2>&1 | tee "$log_path"
          deploy_url="$(python3 -c 'import re, sys; from pathlib import Path; text = Path(sys.argv[1]).read_text(encoding="utf-8"); workers_matches = re.findall(r"https://[^\s]+\.workers\.dev[^\s]*", text); deploy_match = re.search(r"Deployed .*?triggers.*?\n\s*(https://\S+)", text, re.DOTALL); print(workers_matches[-1] if workers_matches else (deploy_match.group(1) if deploy_match else ""))' "$log_path")"
          if [ -z "$deploy_url" ]; then
            echo "Failed to detect deployed Worker URL from Wrangler output" >&2
            exit 1
          fi
          echo "url=$deploy_url" >> "$GITHUB_OUTPUT"
      - name: Select smoke origin
        id: smoke_target
        shell: bash
        env:
          CUSTOM_DEPLOY_URL: ${{ steps.smoke_origin.outputs.value }}
          WORKERS_DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          if [ -n "$CUSTOM_DEPLOY_URL" ] && python3 -c 'import socket, sys; from urllib.parse import urlparse; host = urlparse(sys.argv[1]).hostname; socket.getaddrinfo(host, 443)' "$CUSTOM_DEPLOY_URL" >/dev/null 2>&1; then
            echo "value=$CUSTOM_DEPLOY_URL" >> "$GITHUB_OUTPUT"
            echo "Using custom-domain smoke origin: $CUSTOM_DEPLOY_URL"
          else
            echo "value=$WORKERS_DEPLOY_URL" >> "$GITHUB_OUTPUT"
            if [ -n "$CUSTOM_DEPLOY_URL" ]; then
              echo "Custom domain not resolvable yet; falling back to workers.dev smoke origin: $WORKERS_DEPLOY_URL"
            else
              echo "Using workers.dev smoke origin: $WORKERS_DEPLOY_URL"
            fi
          fi
      - name: Smoke deployed Worker
        env:
          DEPLOY_URL: ${{ steps.smoke_target.outputs.value }}
        run: |
          python3 scripts/smoke_cloudflare_public_deploy.py \
            --deploy-url "$DEPLOY_URL" \
            --base-path "${{ steps.base_path.outputs.value }}" \
            --public-root release-gate/public
