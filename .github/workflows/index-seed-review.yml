name: index-seed-review

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Maximum number of candidate targets to crawl for this review batch
        required: false
        default: "5"
      batch_size:
        description: Maximum repositories per reviewer-facing batch artifact
        required: false
        default: "3"
      open_pr:
        description: Open a draft PR for the first eligible batch after review artifacts are generated
        required: false
        default: "false"
      targets_file:
        description: Grouped candidate catalog for seed growth (default from growth baseline)
        required: false
        default: index/tranche-two-targets.txt
  schedule:
    - cron: "0 13 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: index-seed-review
  cancel-in-progress: false

jobs:
  candidate-seed-review:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Create and sync Python environment
        run: |
          uv venv
          uv sync --dev --locked
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Cache cargo artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Resolve workflow inputs
        id: inputs
        shell: bash
        run: |
          limit="${{ github.event.inputs.limit }}"
          batch_size="${{ github.event.inputs.batch_size }}"
          open_pr="${{ github.event.inputs.open_pr }}"
          targets_file="${{ github.event.inputs.targets_file }}"
          if [ -z "$limit" ]; then
            limit="5"
          fi
          if [ -z "$batch_size" ]; then
            batch_size="3"
          fi
          if [ -z "$open_pr" ]; then
            open_pr="false"
          fi
          if [ -z "$targets_file" ]; then
            targets_file="$(uv run python -c 'import json; print(json.load(open("scripts/fixtures/index_growth_tranche_baseline.json"))["candidateFile"])')"
          fi
          current_high_signal="$(uv run python -c 'import json; print(json.load(open("scripts/fixtures/public_profile_coverage_baseline.json"))["minHighSignal"])')"
          milestone_high_signal_target="$(uv run python -c 'import json; print(json.load(open("scripts/fixtures/index_growth_tranche_baseline.json"))["milestoneHighSignalTarget"])')"
          min_planned_capacity=$((current_high_signal + 1))
          echo "limit=$limit" >> "$GITHUB_OUTPUT"
          echo "batch_size=$batch_size" >> "$GITHUB_OUTPUT"
          echo "open_pr=$open_pr" >> "$GITHUB_OUTPUT"
          echo "targets_file=$targets_file" >> "$GITHUB_OUTPUT"
          echo "current_high_signal=$current_high_signal" >> "$GITHUB_OUTPUT"
          echo "milestone_high_signal_target=$milestone_high_signal_target" >> "$GITHUB_OUTPUT"
          echo "min_planned_capacity=$min_planned_capacity" >> "$GITHUB_OUTPUT"
      - name: Resolve auto-PR mode
        id: pr_mode
        shell: bash
        run: |
          enabled="false"
          if [ "${{ steps.inputs.outputs.open_pr }}" = "true" ] || [ "${{ vars.DOTREPO_INDEX_SEED_AUTO_PR_ENABLED }}" = "true" ]; then
            enabled="true"
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
      - name: Generate candidate seed review artifacts
        id: generate
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p index-seed-review
          status=0
          uv run python scripts/plan_index_growth_tranche.py \
            --candidate-file "${{ steps.inputs.outputs.targets_file }}" \
            --target-count "${{ steps.inputs.outputs.limit }}" \
            --min-selected 1 \
            --current-high-signal "${{ steps.inputs.outputs.current_high_signal }}" \
            --milestone-high-signal-target "${{ steps.inputs.outputs.milestone_high_signal_target }}" \
            --min-planned-high-signal-capacity "${{ steps.inputs.outputs.min_planned_capacity }}" \
            --output-targets index-seed-review/planned-targets.txt \
            --output-json index-seed-review/growth-plan.json \
            --output-md index-seed-review/growth-plan.md || status=$?
          if [ "$status" -eq 0 ]; then
            cargo run -p dotrepo-crawler -- seed \
              --targets-file index-seed-review/planned-targets.txt \
              --limit "${{ steps.inputs.outputs.limit }}" \
              --dry-run \
              --review-report-md index-seed-review/seed-review.md \
              --json > index-seed-review/seed-report.json || status=$?
          fi
          if [ "$status" -eq 0 ] && [ -s index-seed-review/seed-report.json ]; then
            uv run python scripts/plan_seed_review_batches.py \
              --input index-seed-review/seed-report.json \
              --batch-size "${{ steps.inputs.outputs.batch_size }}" \
              --output-json index-seed-review/seed-batches.json \
              --output-md index-seed-review/seed-batches.md
          fi
          uv run python scripts/render_index_growth_status.py \
            --targets-file "${{ steps.inputs.outputs.targets_file }}" \
            --milestone-high-signal-target "${{ steps.inputs.outputs.milestone_high_signal_target }}" \
            --output-json index-seed-review/growth-status.json \
            --output-md index-seed-review/growth-status.md
          cat <<EOF > index-seed-review/run-context.txt
          workflow=index-seed-review
          limit=${{ steps.inputs.outputs.limit }}
          batch_size=${{ steps.inputs.outputs.batch_size }}
          targets_file=${{ steps.inputs.outputs.targets_file }}
          ref=${{ github.ref }}
          sha=${{ github.sha }}
          run_id=${{ github.run_id }}
          event_name=${{ github.event_name }}
          EOF
          exit "$status"
      - name: Publish GitHub summary
        if: always()
        run: |
          if [ -s index-seed-review/seed-report.json ]; then
            uv run python scripts/render_seed_review_summary.py \
              --input index-seed-review/seed-report.json \
              --batches index-seed-review/seed-batches.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "# Index Seed Review" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "- seed-report.json was not produced; inspect uploaded artifacts" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -s index-seed-review/growth-status.md ]; then
            echo >> "$GITHUB_STEP_SUMMARY"
            cat index-seed-review/growth-status.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -s index-seed-review/growth-plan.md ]; then
            echo >> "$GITHUB_STEP_SUMMARY"
            cat index-seed-review/growth-plan.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload candidate seed review artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: index-seed-review
          path: index-seed-review/
          if-no-files-found: error
          retention-days: 7
      - name: Select first eligible seed batch for auto-PR
        id: auto_batch
        if: steps.generate.outcome == 'success' && steps.pr_mode.outputs.enabled == 'true'
        shell: bash
        run: |
          selected="false"
          if uv run python scripts/select_review_batch.py \
            --input index-seed-review/seed-batches.json \
            --first-batch \
            --skip-batches-with-failed \
            --require-no-failed \
            --output-targets index-seed-review/selected-targets.txt \
            --output-metadata index-seed-review/selected-batch.json; then
            selected="true"
            batch_id="$(uv run python -c 'import json, sys; data = json.load(open(sys.argv[1])); print(data["batch"]["id"])' index-seed-review/selected-batch.json)"
            repo_count="$(uv run python -c 'import json, sys; data = json.load(open(sys.argv[1])); print(data["batch"]["repositoryCount"])' index-seed-review/selected-batch.json)"
            title="$(uv run python -c 'import json, sys; data = json.load(open(sys.argv[1])); print("chore(index): {}".format(data["batch"]["suggestedPrTitle"]))' index-seed-review/selected-batch.json)"
            branch="automation/index-seed-review/$batch_id-${{ github.run_id }}"
            echo "batch_id=$batch_id" >> "$GITHUB_OUTPUT"
            echo "repo_count=$repo_count" >> "$GITHUB_OUTPUT"
            echo "title=$title" >> "$GITHUB_OUTPUT"
            echo "branch=$branch" >> "$GITHUB_OUTPUT"
          fi
          echo "selected=$selected" >> "$GITHUB_OUTPUT"
      - name: Append seed auto-PR summary
        if: steps.pr_mode.outputs.enabled == 'true'
        shell: bash
        run: |
          {
            echo
            echo "## Auto PR"
            echo
            if [ "${{ steps.auto_batch.outputs.selected }}" = "true" ]; then
              echo "- selected batch: \`${{ steps.auto_batch.outputs.batch_id }}\`"
              echo "- branch: \`${{ steps.auto_batch.outputs.branch }}\`"
              echo "- draft PR title: \`${{ steps.auto_batch.outputs.title }}\`"
            else
              echo "- no eligible seed batch was selected for automatic PR creation"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Render seed auto-PR body
        if: steps.auto_batch.outputs.selected == 'true'
        shell: bash
        run: |
          uv run python scripts/render_review_batch_pull_request.py \
            --input index-seed-review/selected-batch.json \
            --kind seed \
            --output index-seed-review/pr-body.md
      - name: Apply selected seed batch for auto-PR
        if: steps.auto_batch.outputs.selected == 'true'
        shell: bash
        run: |
          cargo run -p dotrepo-crawler -- seed \
            --targets-file index-seed-review/selected-targets.txt \
            --limit "${{ steps.auto_batch.outputs.repo_count }}" \
            --review-report-md index-seed-review/applied-seed-review.md \
            --json > index-seed-review/applied-seed-report.json
      - name: Validate index after seed auto-PR writeback
        if: steps.auto_batch.outputs.selected == 'true'
        run: cargo run -p dotrepo-cli -- validate-index
      - name: Create draft seed auto-PR
        id: seed_pr
        if: steps.auto_batch.outputs.selected == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: ${{ steps.auto_batch.outputs.branch }}
          title: ${{ steps.auto_batch.outputs.title }}
          commit-message: ${{ steps.auto_batch.outputs.title }}
          body-path: index-seed-review/pr-body.md
          draft: true
          delete-branch: true
          add-paths: |
            index/**
      - name: Append seed auto-PR result
        if: steps.auto_batch.outputs.selected == 'true'
        shell: bash
        run: |
          {
            echo
            echo "## Auto PR Result"
            echo
            if [ "${{ steps.seed_pr.outcome }}" = "success" ] && [ -n "${{ steps.seed_pr.outputs.pull-request-url }}" ]; then
              echo "- draft PR: ${{ steps.seed_pr.outputs.pull-request-url }}"
            else
              echo "- draft PR creation was blocked or failed after branch push"
              echo "- branch: \`${{ steps.auto_batch.outputs.branch }}\`"
              echo "- compare URL: https://github.com/${{ github.repository }}/compare/${{ github.ref_name }}...${{ steps.auto_batch.outputs.branch }}?expand=1"
              echo "- enable 'Allow GitHub Actions to create and approve pull requests' or provide a stronger token if direct PR creation is required"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload seed auto-PR execution artifacts
        if: always() && steps.auto_batch.outputs.selected == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: index-seed-review-auto-pr
          path: index-seed-review/
          if-no-files-found: error
          retention-days: 7
      - name: Fail workflow if candidate crawl generation failed
        if: steps.generate.outcome == 'failure'
        run: |
          echo "candidate seed review completed with crawl failures; inspect uploaded artifacts" >&2
          exit 1
