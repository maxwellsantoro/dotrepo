name: index-autonomous-refresh

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      batch_id:
        description: Batch identifier from refresh-batches.json
        required: false
        default: refresh-batch-01
      batch_size:
        description: Maximum repositories per batch
        required: false
        default: "5"
      limit:
        description: Maximum tracked repositories to inspect while planning
        required: false
        default: "20"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: index-autonomous-refresh
  cancel-in-progress: true

jobs:
  autonomous-refresh:
    runs-on: ubuntu-latest
    # Fail closed: only run when the repository variable is explicitly true.
    if: vars.INDEX_AUTOMATION_ENABLED == 'true'
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      INDEX_AUTOMATION_ENABLED: ${{ vars.INDEX_AUTOMATION_ENABLED }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Create and sync Python environment
        run: |
          uv venv
          uv sync --dev --locked
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Cache cargo artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Start adjudication sidecars
        if: env.OPENROUTER_API_KEY != ''
        shell: bash
        env:
          DOTREPO_ADJUDICATION_MODEL_CONFIG: ${{ vars.DOTREPO_ADJUDICATION_MODEL }}
          DOTREPO_ADJUDICATION_SECOND_OPINION_MODEL_CONFIG: ${{ vars.DOTREPO_ADJUDICATION_SECOND_OPINION_MODEL }}
          DOTREPO_ADJUDICATION_API_MODEL_CONFIG: ${{ vars.DOTREPO_ADJUDICATION_API_MODEL }}
        run: |
          wait_for_sidecar() {
            local port="$1"
            SIDECAR_PORT="$port" uv run python - <<'PY'
          import os
          import time
          import urllib.request

          port = os.environ["SIDECAR_PORT"]
          deadline = time.time() + 20
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(f"http://127.0.0.1:{port}/health", timeout=2) as response:
                      if response.status == 200:
                          break
              except Exception:
                  time.sleep(0.25)
          else:
              raise SystemExit(f"adjudication sidecar did not become healthy on port {port}")
          PY
          }

          start_sidecar() {
            local name="$1"
            local port="$2"
            local model="$3"
            if [ -z "$model" ]; then
              return 0
            fi
            nohup uv run python scripts/adjudication_openrouter_sidecar.py \
              --port "$port" > "index-adjudication-${name}.log" 2>&1 &
            echo "$!" > "index-adjudication-${name}.pid"
            wait_for_sidecar "$port"
          }

          start_sidecar "primary" "8787" "$DOTREPO_ADJUDICATION_MODEL_CONFIG"
          start_sidecar "second-opinion" "8788" "$DOTREPO_ADJUDICATION_SECOND_OPINION_MODEL_CONFIG"
          start_sidecar "api-escalation" "8789" "$DOTREPO_ADJUDICATION_API_MODEL_CONFIG"

          {
            if [ -n "$DOTREPO_ADJUDICATION_MODEL_CONFIG" ]; then
              echo "DOTREPO_ADJUDICATION_URL=http://127.0.0.1:8787/adjudicate"
              echo "DOTREPO_ADJUDICATION_PROVIDER=openrouter"
              echo "DOTREPO_ADJUDICATION_MODEL=$DOTREPO_ADJUDICATION_MODEL_CONFIG"
            fi
            if [ -n "$DOTREPO_ADJUDICATION_SECOND_OPINION_MODEL_CONFIG" ]; then
              echo "DOTREPO_ADJUDICATION_SECOND_OPINION_URL=http://127.0.0.1:8788/adjudicate"
              echo "DOTREPO_ADJUDICATION_SECOND_OPINION_PROVIDER=openrouter-second-opinion"
              echo "DOTREPO_ADJUDICATION_SECOND_OPINION_MODEL=$DOTREPO_ADJUDICATION_SECOND_OPINION_MODEL_CONFIG"
            fi
            if [ -n "$DOTREPO_ADJUDICATION_API_MODEL_CONFIG" ]; then
              echo "DOTREPO_ADJUDICATION_API_URL=http://127.0.0.1:8789/adjudicate"
              echo "DOTREPO_ADJUDICATION_API_PROVIDER=openrouter-api-escalation"
              echo "DOTREPO_ADJUDICATION_API_MODEL=$DOTREPO_ADJUDICATION_API_MODEL_CONFIG"
            fi
            echo "INDEX_MAX_ADJUDICATION_CALLS=${{ vars.INDEX_MAX_ADJUDICATION_CALLS || '2' }}"
            echo "INDEX_MAX_BATCH_ADJUDICATION_CALLS=${{ vars.INDEX_MAX_BATCH_ADJUDICATION_CALLS || vars.INDEX_MAX_ADJUDICATION_CALLS || '4' }}"
          } >> "$GITHUB_ENV"
      - name: Run autonomous refresh batch
        id: autonomous_batch
        continue-on-error: true
        run: |
          uv run python scripts/run_autonomous_index_batch.py \
            --batch-id "${{ github.event.inputs.batch_id || 'refresh-batch-01' }}" \
            --batch-size "${{ github.event.inputs.batch_size || '5' }}" \
            --limit "${{ github.event.inputs.limit || '20' }}" \
            --adjudication-call-budget "${INDEX_MAX_BATCH_ADJUDICATION_CALLS:-0}" \
            --discovery-limit "${{ vars.INDEX_DISCOVERY_LIMIT || github.event.inputs.batch_size || '5' }}" \
            --output-dir index-autonomous-batch
      - name: Evaluate autonomous telemetry gate
        id: telemetry_gate
        if: always()
        shell: bash
        run: |
          mkdir -p index-autonomous-batch
          if [ -f index/telemetry/autonomous-summary.json ]; then
            # Strict: proof gates must pass before a draft PR can open.
            uv run python scripts/check_autonomous_telemetry_gate.py \
              --summary index/telemetry/autonomous-summary.json \
              --output-json index-autonomous-batch/autonomous-telemetry-gate.json \
              --output-md index-autonomous-batch/autonomous-telemetry-gate.md
          else
            echo "No retained telemetry summary yet; skipping telemetry gate"
          fi
      - name: Validate autonomous index state
        id: validate_index
        if: always()
        run: cargo run -q -p dotrepo-cli -- validate-index
      - name: Upload batch telemetry
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: index-autonomous-batch
          path: index-autonomous-batch/
          if-no-files-found: warn
          retention-days: 14
      - name: Prepare draft pull request metadata
        id: pr_meta
        if: always() && steps.telemetry_gate.outcome == 'success' && steps.validate_index.outcome == 'success'
        shell: bash
        run: |
          if [ ! -f index-autonomous-batch/telemetry.json ]; then
            echo "No completed batch telemetry; refusing to open a draft PR for partial state"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet -- index; then
            echo "No index changes to land"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          batch_id="${{ github.event.inputs.batch_id || 'refresh-batch-01' }}"
          branch="automation/index-autonomous/${batch_id}-${{ github.run_id }}"
          title="chore(index): autonomous refresh batch ${batch_id}"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          {
            echo "# Autonomous index refresh"
            echo
            echo "Automated draft PR from \`index-autonomous-refresh\`."
            echo "Review index diffs, release floors, and telemetry before merge."
            echo
            echo "- batch: \`${batch_id}\`"
            echo "- run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            if [ -f index-autonomous-batch/telemetry.json ]; then
              uv run python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("index-autonomous-batch/telemetry.json").read_text())
          print()
          print("## Batch telemetry")
          print(f"- crawled: {data.get('crawled', 0)}")
          print(f"- written: {data.get('written', 0)}")
          print(f"- skipped: {data.get('skipped', 0)}")
          print(f"- failed: {data.get('failed', 0)}")
          print(f"- adjudication calls: {data.get('adjudicationCalls', 0)}")
          print(f"- tokens used: {data.get('tokensUsed', 0)}")
          PY
            fi
            if [ -f index-autonomous-batch/autonomous-telemetry-gate.md ]; then
              echo
              cat index-autonomous-batch/autonomous-telemetry-gate.md
            fi
          } > index-autonomous-batch/pr-body.md
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
      - name: Create draft pull request for index updates
        id: autonomous_pr
        if: >-
          always()
          && steps.telemetry_gate.outcome == 'success'
          && steps.validate_index.outcome == 'success'
          && steps.pr_meta.outcome == 'success'
          && steps.pr_meta.outputs.skip == 'false'
        continue-on-error: true
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.pr_meta.outputs.branch }}
          title: ${{ steps.pr_meta.outputs.title }}
          commit-message: ${{ steps.pr_meta.outputs.title }}
          body-path: index-autonomous-batch/pr-body.md
          draft: true
          delete-branch: true
          add-paths: |
            index/**
      - name: Publish step summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Autonomous Index Refresh"
            echo
            if [ -f index-autonomous-batch/telemetry.json ]; then
              uv run python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("index-autonomous-batch/telemetry.json").read_text())
          print(f"- batch: `{data['batchId']}`")
          print(f"- crawled: {data['crawled']}")
          print(f"- written: {data['written']}")
          print(f"- skipped: {data['skipped']}")
          print(f"- failed: {data['failed']}")
          print(f"- quality reprocess queued: {data.get('qualityReprocessQueued', 0)}")
          print(f"- discovery queued: {data.get('discoveryQueued', 0)}")
          print(f"- adjudication calls: {data.get('adjudicationCalls', 0)}")
          print(f"- adjudication budget: {data.get('adjudicationCallBudget', 0)}")
          print(f"- adjudication budget exhausted: {data.get('adjudicationBudgetExhausted', False)}")
          print(f"- tokens used: {data.get('tokensUsed', 0)}")
          print(f"- adjudication rate: {data.get('adjudicationRate', 0.0):.2%}")
          tiers = data.get("repositoriesByAdjudicationTier", {})
          if tiers:
              print("- repositories by adjudication tier:")
              for tier, count in sorted(tiers.items()):
                  print(f"  - {tier}: {count}")
          summary_path = Path("index/telemetry/autonomous-summary.json")
          if summary_path.is_file():
              summary = json.loads(summary_path.read_text())
              totals = summary.get("totals", {})
              rates = summary.get("rates", {})
              print()
              print("## Retained Telemetry")
              print(f"- retained runs: {summary.get('runCount', 0)}")
              print(f"- total crawled: {totals.get('crawled', 0)}")
              print(f"- total written: {totals.get('written', 0)}")
              print(f"- total failed: {totals.get('failed', 0)}")
              print(f"- total quality reprocess queued: {totals.get('qualityReprocessQueued', 0)}")
              print(f"- total discovery queued: {totals.get('discoveryQueued', 0)}")
              print(f"- total promoted: {totals.get('promoted', 0)}")
              print(f"- budget-exhausted runs: {summary.get('budgetExhaustedRuns', 0)}")
              print(f"- aggregate adjudication rate: {rates.get('adjudicationRate', 0.0):.2%}")
              print(f"- aggregate promotion rate: {rates.get('promotionRate', 0.0):.2%}")
              print(f"- aggregate zero-model rate: {rates.get('zeroModelRate', 0.0):.2%}")
              worst_rates = summary.get("worstRunRates", {})
              if worst_rates:
                  print(f"- worst-run failure rate: {worst_rates.get('failureRate', 0.0):.2%}")
                  print(f"- worst-run adjudication rate: {worst_rates.get('adjudicationRate', 0.0):.2%}")
                  print(f"- worst-run second-opinion rate: {worst_rates.get('secondOpinionRate', 0.0):.2%}")
                  print(f"- worst-run API escalation rate: {worst_rates.get('apiEscalationRate', 0.0):.2%}")
              summary_tiers = summary.get("repositoriesByAdjudicationTier", {})
              if summary_tiers:
                  print("- aggregate repositories by adjudication tier:")
                  for tier, count in sorted(summary_tiers.items()):
                      print(f"  - {tier}: {count}")
              fixture_candidates = summary.get("regressionFixtureCandidates", [])
              if fixture_candidates:
                  print("- recurring failure fixture candidates:")
                  for item in fixture_candidates[:5]:
                      print(f"  - {item.get('failureClass', 'unknown')}/{item.get('suggestedFixture', 'unknown')}: {item.get('count', 0)}")
                  eligible_count = sum(1 for item in fixture_candidates if item.get("fixtureEligible"))
                  print(f"- fixture-eligible recurring failures: {eligible_count}")
                  print("- fixture backlog: `index/telemetry/regression-fixture-candidates.md`")
                  print("- fixture stubs: `index/telemetry/regression-fixture-stubs/`")
              gate_path = Path("index-autonomous-batch/autonomous-telemetry-gate.json")
              if gate_path.is_file():
                  gate = json.loads(gate_path.read_text())
                  print()
                  print("## Autonomous Telemetry Gate")
                  print(f"- result: {'pass' if gate.get('passed') else 'fail (strict)'}")
                  check_summary = gate.get("checkSummary", {})
                  if check_summary:
                      print(f"- checks: {check_summary.get('passed', 0)}/{check_summary.get('total', 0)} passed")
                      failed_labels = check_summary.get("failedLabels", [])
                      if failed_labels:
                          print(f"- failed checks: {', '.join(failed_labels)}")
                  for item in gate.get("checks", []):
                      print(f"- {item['label']}: {item['actual']} / {item['expected']} ({'pass' if item['passed'] else 'fail'})")
          PY
            else
              echo "- telemetry: unavailable"
            fi
            echo
            echo "## Landing"
            if [ "${{ steps.autonomous_pr.outcome }}" = "success" ] && [ -n "${{ steps.autonomous_pr.outputs.pull-request-url }}" ]; then
              echo "- draft PR: ${{ steps.autonomous_pr.outputs.pull-request-url }}"
            elif [ "${{ steps.pr_meta.outcome }}" = "success" ]; then
              echo "- draft PR creation was blocked, skipped (no index changes), or failed after branch push"
              echo "- branch: \`${{ steps.pr_meta.outputs.branch }}\`"
              echo "- enable 'Allow GitHub Actions to create and approve pull requests' if PR creation is required"
            else
              echo "- no draft PR attempted (telemetry gate, validate-index, or missing prerequisites)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Preserve autonomous batch failure result
        if: always() && steps.autonomous_batch.outcome == 'failure'
        run: |
          echo "Autonomous batch reported one or more failures after retaining telemetry" >&2
          exit 1
      - name: Fail closed on strict telemetry gate
        if: always() && steps.telemetry_gate.outcome == 'failure'
        run: |
          echo "Autonomous telemetry gate failed under strict mode; draft PR not opened" >&2
          exit 1
