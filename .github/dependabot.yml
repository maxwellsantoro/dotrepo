# Keeps dependency pins current. Action pins use trailing `# <tag>` comments
# on `uses:` lines so Dependabot can propose SHA updates.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      cargo-minor:
        patterns:
          - "*"
        update-types:
          - "minor"

  - package-ecosystem: npm
    directory: /cloudflare/hosted-query
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      hosted-query-npm:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /editors/vscode
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      vscode-npm:
        patterns:
          - "*"
