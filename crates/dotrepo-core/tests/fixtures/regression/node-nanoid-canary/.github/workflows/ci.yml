name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Test (compound often present)
        run: pnpm install && pnpm test -- --coverage
