name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven wrapper (compound style often seen in CI)
        run: ./mvnw -B --no-transfer-progress clean package -DskipTests

      - name: Run tests
        run: ./mvnw -B test
