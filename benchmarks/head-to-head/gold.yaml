# Gold dataset for the dotrepo head-to-head.
#
# Each field is either a scalar gold value, or {gold: <value|null>, note: ...}.
# A null gold is EXCLUDED from scoring (outcome NO_GOLD) -- use it as a "curate
# me" marker. Matching is lenient per field type (see bench/model.py):
#   description -> substring   license -> SPDX   build/test -> token containment
#   homepage    -> URL-normalized   archived -> boolean
#
# Curate buried fields (build/test/security_contact/min_toolchain) from the
# repo's OWN docs, not from memory. The whole experiment is whether dotrepo
# matches that ground truth more accurately, and more honestly, than a good
# GitHub+README agent.

repos:
  github.com/sharkdp/fd:            # github-native fields verified live via REST
    description: "alternative to 'find'"
    license: "Apache-2.0"
    language: "Rust"
    homepage: {gold: null, note: "no homepage set on GitHub; dotrepo may still assert one"}
    archived: "active"
    build: {gold: "cargo build", note: "README Development section: Build -> cargo build"}
    test: {gold: "cargo test", note: "README Development section: Run unit tests and integration tests -> cargo test"}
    security_contact: {gold: "https://github.com/sharkdp/fd/security/advisories/new", note: "SECURITY.md vulnerability reporting form"}
    min_toolchain: {gold: "1.90.0", note: "Cargo.toml rust-version; README install prose still mentions an older release floor"}

  github.com/BurntSushi/ripgrep:
    description: "recursively search"
    license: "Unlicense"
    language: "Rust"
    homepage: {gold: null, note: "no homepage set on GitHub"}
    archived: "active"
    build: {gold: "cargo build --release", note: "README Building section"}
    test: {gold: "cargo test --all", note: "README Running tests section"}
    security_contact: {gold: "https://blog.burntsushi.net/about/", note: "README Vulnerability reporting section"}
    min_toolchain: {gold: "1.85.0", note: "README and Cargo.toml rust-version"}

  github.com/astral-sh/uv:
    description: "package"
    license: "Apache-2.0"
    language: "Rust"
    homepage: "https://docs.astral.sh/uv"
    archived: "active"
    build: {gold: null, note: "CONTRIBUTING documents build prerequisites but not one canonical build command"}
    test: {gold: "cargo nextest run", note: "CONTRIBUTING recommends nextest for running tests"}
    security_contact: {gold: "https://github.com/astral-sh/.github/blob/main/SECURITY.md", note: "SECURITY.md points to the organization security policy"}
    min_toolchain: {gold: "1.94.0", note: "Cargo.toml rust-version; rust-toolchain.toml pins a newer toolchain channel"}

  github.com/sharkdp/bat:
    description: "cat(1) clone with wings"
    license: "Apache-2.0"
    language: "Rust"
    homepage: {gold: null, note: "no homepage set on GitHub"}
    archived: "active"
    build: {gold: "cargo build --bins", note: "README Development section: Build (debug version)"}
    test: {gold: "cargo test", note: "README Development section: Run unit tests and integration tests"}
    security_contact: {gold: "https://david-peter.de/", note: "SECURITY.md says to contact David Peter via email at his site"}
    min_toolchain: {gold: "1.88", note: "Cargo.toml rust-version; README install prose still mentions an older release floor"}

  github.com/astral-sh/ruff:
    description: "Python linter and code formatter"
    license: "MIT"
    language: "Rust"
    homepage: "https://docs.astral.sh/ruff"
    archived: "active"
    build: {gold: "cargo build --workspace", note: "Cargo workspace build; CONTRIBUTING focuses on running ruff locally rather than a separate build step"}
    test: {gold: "cargo test", note: "CONTRIBUTING development checks include RUFF_UPDATE_SCHEMA=1 cargo test"}
    security_contact: {gold: null, note: "no repository SECURITY.md fetched for this benchmark curation"}
    min_toolchain: {gold: "1.94", note: "Cargo.toml rust-version; rust-toolchain.toml pins a newer channel"}

  github.com/starship/starship:
    description: "minimal, blazing-fast"
    license: "ISC"
    language: "Rust"
    homepage: "https://starship.rs"
    archived: "active"
    build: {gold: "cargo build", note: "Cargo.toml root package; no canonical README build command; ignore maintenance workflow npm build"}
    test: {gold: "cargo test", note: "CONTRIBUTING says unit tests can be run with cargo test"}
    security_contact: {gold: "https://github.com/starship/starship/security/advisories/new", note: "SECURITY.md GitHub Advisory reporting link"}
    min_toolchain: {gold: "1.90", note: "Cargo.toml rust-version"}

  github.com/hyperium/hyper:
    description: "HTTP library for Rust"
    license: "MIT"
    language: "Rust"
    homepage: "https://hyper.rs"
    archived: "active"
    build: {gold: "cargo build", note: "Cargo.toml root crate/workspace default; no separate canonical build command in README/CONTRIBUTING"}
    test: {gold: "cargo test", note: "Cargo.toml Rust crate default; crawler deterministic fallback should not use unsafe workflow shell"}
    security_contact: {gold: "https://github.com/hyperium/hyper/security/advisories/new", note: "SECURITY.md draft advisory link"}
    min_toolchain: {gold: "1.63", note: "Cargo.toml rust-version"}

  github.com/spf13/cobra:
    description: "Commander for modern Go CLI"
    license: "Apache-2.0"
    language: "Go"
