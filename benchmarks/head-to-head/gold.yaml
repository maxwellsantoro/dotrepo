    test: {gold: "pnpm test", note: "CONTRIBUTING/package.json: pnpm test runs unit, serve, and build tests"}
    security_contact: {gold: "https://github.com/vitejs/vite/security", note: ".github/SECURITY.md private vulnerability report URL"}
    min_toolchain: {gold: "20.19.0", note: "package.json engines.node floor ^20.19.0 || >=22.12.0"}

  github.com/tokio-rs/tokio:
    description: "runtime for writing reliable asynchronous applications"
    license: "MIT"
    language: "Rust"
    homepage: "https://tokio.rs"
    archived: "active"
    build: {gold: "cargo build", note: "Cargo workspace default; workflow Fortanix target build is not canonical"}
    test: {gold: "cargo test", note: "Cargo workspace default; workflow doc-only/full-features test is not canonical suite command"}
    security_contact: {gold: "security@tokio.rs", note: "SECURITY.md reporting mailbox"}
    min_toolchain: {gold: "1.71", note: "README current MSRV"}
