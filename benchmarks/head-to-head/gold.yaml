    build: {gold: "make build", note: "Makefile build target imported; Go module also supports go build"}
    test: {gold: "make test", note: "CONTRIBUTING says run tests with go test ./... or make test; Makefile provides canonical target"}
    security_contact: {gold: "cobra-security@googlegroups.com", note: "SECURITY.md reporting email"}
    min_toolchain: {gold: "1.15", note: "go.mod go directive"}

  github.com/vitejs/vite:
